<!doctype html>
<html lang="en" style="width: 440px; height: 280px; overflow: hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=440" />
    <title>Plume AI — Promo Tile</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f0f14 0%, #1a1b23 50%, #0d1a17 100%);
        position: relative;
      }

      /* Subtle radial glow */
      .glow-top {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 200px;
        background: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.1) 0%, transparent 70%);
        pointer-events: none;
      }

      .glow-bottom {
        position: absolute;
        bottom: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 360px;
        height: 120px;
        background: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.18) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Subtle grid overlay */
      .grid-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 28px 28px;
        pointer-events: none;
      }

      /* Content */
      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px;
      }

      .icon-wrap {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 4px 20px rgba(0, 212, 170, 0.25),
          0 0 0 1.5px rgba(0, 212, 170, 0.2),
          0 0 0 4px rgba(0, 212, 170, 0.06);
      }

      .icon-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .app-title {
        font-size: 24px;
        font-weight: 700;
        color: #e8e9ed;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .tagline {
        font-size: 13px;
        font-weight: 500;
        color: #00d4aa;
        letter-spacing: 0.04em;
      }

      /* Provider badges */
      .badges {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 2px;
      }

      .badge {
        height: 20px;
        padding: 0 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        font-size: 10px;
        font-weight: 500;
        color: #8b8d98;
        display: flex;
        align-items: center;
      }

      /* Bottom accent line */
      .bottom-accent {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          #00d4aa 30%,
          #0ea5e9 70%,
          transparent 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="grid-bg"></div>

    <div class="content">
      <div class="icon-wrap">
        <img src="icon-48.png" alt="Plume AI" />
      </div>
      <div class="app-title">Plume AI</div>
      <div class="tagline">Grammar · Rewrite · Translate</div>
      <div class="badges">
        <div class="badge">Gemini</div>
        <div class="badge">Claude</div>
        <div class="badge">OpenAI</div>
        <div class="badge">Mistral</div>
      </div>
    </div>

    <div class="bottom-accent"></div>
  </body>
</html>
