name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Chrome zip
        run: npm run build:zip

      - name: Build Firefox zip
        run: npm run build:zip:firefox

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            releases/plume-ai-${{ steps.version.outputs.version }}-chrome.zip
            releases/plume-ai-${{ steps.version.outputs.version }}-firefox.zip
